  {id:'w5',name:'Westminster and the Eye',area:'SW1',time:'sunrise',
   duration:'2-3 hrs',distance:'3 km',
   pitch:'The most photographed corridor in England. Go before 7am. Go when it rains.',
   spots:[59,68,69,60,63,64,67,61,62,65,66]},
  {id:'w6',name:'West End After Dark',area:'W1',time:'night',
   duration:'2-3 hrs',distance:'2.5 km',
   pitch:'Neon, rain, panning shots, and the kind of chaos that makes for great street photography.',
   spots:[80,81,83,88,89,82,84,85,86,87]},
  {id:'w7',name:'Kings Cross to Bloomsbury',area:'N1/WC1',time:'day',
   duration:'2 hrs',distance:'1.5 km',
   pitch:'Architecture, staircases, and tunnels. Underrated for photography and usually crowd-free on weekends.',
   spots:[73,74,75,76,77,78,79]},
  {id:'w8',name:'West London and Battersea',area:'SW3/SW8/W8',time:'any',
   duration:'3-4 hrs',distance:'4 km',
   pitch:'Spread out but worth the journey. Museums, mews streets, and the power station at dusk.',
   spots:[91,92,93,94,95,96,99,97,98]},
  {id:'w9',name:'Canary Wharf Circuit',area:'E14',time:'blue',
   duration:'3 hrs',distance:'3.5 km',
   pitch:'The most underrated evening walk in London. Glass, water, symmetry, and cranes at blue hour.',
   spots:[102,103,104,113,109,108,112,111,105,106,107,110,114,116,117]},
  {id:'w10',name:'East London and the O2',area:'SE10/E14',time:'blue',
   duration:'2 hrs',distance:'2.5 km',
   pitch:'A quiet corner of London that most photographers completely skip. Go at blue hour and you will have it to yourself.',
   spots:[118,121,119,120,101,115]},
  {id:'w11',name:'Parks, Hills and High Ground',area:'Various',time:'sunrise',
   duration:'Half day',distance:'Multiple locations',
   pitch:'The viewpoints that require a bit more effort to reach but give you perspectives that no one else has.',
   spots:[72,71,70,62,122,123,124,126,125]}
];

// ── BUILD LOOKUP ──
var SPOTS_BY_ID = {};
for (var i = 0; i < SPOTS.length; i++) {
  SPOTS_BY_ID[SPOTS[i].id] = SPOTS[i];
}

// ── STATE ──
var currentFilter = 'all';
var currentSearch = '';
var currentView = 'explore';
var savedData = {};
try {
  var savedArr = JSON.parse(localStorage.getItem('lps_saved') || '[]');
  for (var i = 0; i < savedArr.length; i++) { savedData[savedArr[i]] = true; }
} catch(e) {}

function savePersist() {
  var keys = [];
  for (var k in savedData) { if (savedData[k]) keys.push(Number(k)); }
  try { localStorage.setItem('lps_saved', JSON.stringify(keys)); } catch(e) {}
}

// ── TAG HELPERS ──
function tagTime(t) {
  var icons = {sunrise:'&#127749;',day:'&#9728;',blue:'&#127750;',night:'&#127769;',any:'&#9200;'};
  var cls = {sunrise:'tag-sunrise',day:'tag-day',blue:'tag-blue',night:'tag-night',any:'tag-any'};
  return '<span class="tag ' + cls[t] + '">' + (icons[t] || '') + ' ' + TIME[t] + '</span>';
}

function tagArea(a) {
  return '<span class="tag tag-' + a + '">' + AREA[a] + '</span>';
}

// ── FILTER ──
function getFiltered() {
  var results = [];
  var q = currentSearch.toLowerCase();
  for (var i = 0; i < SPOTS.length; i++) {
    var s = SPOTS[i];
    var matchSearch = true;
    if (q) {
      matchSearch = s.name.toLowerCase().indexOf(q) >= 0 ||
        AREA[s.area].toLowerCase().indexOf(q) >= 0 ||
        s.desc.toLowerCase().indexOf(q) >= 0 ||
        s.lens.toLowerCase().indexOf(q) >= 0;
    }
    var matchFilter = true;
    if (currentFilter === 'saved') {
      matchFilter = !!savedData[s.id];
    } else if (currentFilter.indexOf('area:') === 0) {
      matchFilter = s.area === currentFilter.slice(5);
    } else if (currentFilter.indexOf('time:') === 0) {
      matchFilter = s.time === currentFilter.slice(5);
    }
    if (matchSearch && matchFilter) results.push(s);
  }
  return results;
}

// ── RENDER SPOTS ──
function renderSpots() {
  var list = document.getElementById('spotsList');
  var empty = document.getElementById('emptyState');
  var rNum = document.getElementById('resultsNum');
  var rLabel = document.getElementById('resultsLabel');
  var filtered = getFiltered();

  if (filtered.length === 0) {
    list.innerHTML = '';
    empty.className = 'empty show';
    rNum.textContent = '';
    rLabel.textContent = 'No results';
    return;
  }
  empty.className = 'empty';
  rNum.textContent = filtered.length + ' spot' + (filtered.length !== 1 ? 's' : '');

  if (currentFilter === 'all' && !currentSearch) {
    rLabel.textContent = 'All locations';
  } else if (currentFilter.indexOf('area:') === 0) {
    rLabel.textContent = AREA[currentFilter.slice(5)] || 'Locations';
  } else if (currentFilter.indexOf('time:') === 0) {
    rLabel.textContent = TIME[currentFilter.slice(5)] || 'Locations';
  } else if (currentFilter === 'saved') {
    rLabel.textContent = 'Saved spots';
  } else {
    rLabel.textContent = currentSearch ? '"' + currentSearch + '"' : 'All locations';
  }

  var html = '';
  for (var i = 0; i < filtered.length; i++) {
    var s = filtered[i];
    var isSaved = !!savedData[s.id];
    var numStr = s.id < 10 ? '0' + s.id : '' + s.id;
    html += '<div class="spot-card" id="card-' + s.id + '">';
    html += '<div class="spot-header" onclick="toggleSpot(' + s.id + ')">';
    html += '<div class="spot-num">' + numStr + '</div>';
    html += '<div class="spot-main">';
    html += '<div class="spot-name">' + s.name + '</div>';
    html += '<div class="spot-tags">' + tagArea(s.area) + tagTime(s.time);
    html += '<span class="tag tag-lens">&#128247; ' + s.lens + '</span>';
    html += '</div></div>';
    html += '<div class="spot-arrow">&#9660;</div>';
    html += '</div>';
    html += '<div class="spot-body">';
    html += '<div class="spot-rule"></div>';
    html += '<div class="meta-grid">';
    html += '<div class="meta-item"><div class="meta-label">Best time</div><div class="meta-value">' + TIME[s.time] + '</div></div>';
    html += '<div class="meta-item"><div class="meta-label">Lens</div><div class="meta-value">' + s.lens + '</div></div>';
    html += '</div>';
    html += '<div class="spot-desc">' + s.desc + '</div>';
    if (s.tip) { html += '<div class="spot-tip">' + s.tip + '</div>'; }
    html += '<div class="spot-actions">';
    html += '<a class="map-btn" href="' + s.url + '" target="_blank">&#8599; Open in Maps</a>';
    html += '<button class="' + (isSaved ? 'save-btn saved' : 'save-btn') + '" onclick="toggleSave(event,' + s.id + ')" title="Save">' + (isSaved ? '&#9733;' : '&#9734;') + '</button>';
    html += '</div></div></div>';
  }
  list.innerHTML = html;
}

// ── RENDER WALKS ──
function renderWalks() {
  var container = document.getElementById('walksList');
  var html = '';
  for (var i = 0; i < WALKS.length; i++) {
    var w = WALKS[i];
    var wNum = (i + 1) < 10 ? '0' + (i + 1) : '' + (i + 1);
    var firstSpot = SPOTS_BY_ID[w.spots[0]];
    html += '<div class="walk-card" id="wcard-' + w.id + '">';
    html += '<div class="walk-header" onclick="toggleWalk(\'' + w.id + '\')">';
    html += '<div class="walk-num">' + wNum + '</div>';
    html += '<div class="walk-info">';
    html += '<div class="walk-name">' + w.name + '</div>';
    html += '<div class="walk-chips">' + tagArea(w.time === 'any' ? 'westlondon' : w.time === 'sunrise' ? 'tower' : w.time === 'blue' ? 'canary' : w.time === 'night' ? 'westend' : 'city') + tagTime(w.time) + '</div>';
    html += '<div class="walk-stats">' + w.spots.length + ' stops &nbsp;&middot;&nbsp; ' + w.distance + ' &nbsp;&middot;&nbsp; ' + w.duration + '</div>';
    html += '<div class="walk-pitch">' + w.pitch + '</div>';
    html += '</div>';
    html += '<div class="walk-arrow">&#9660;</div>';
    html += '</div>';
    html += '<div class="walk-body">';
    html += '<div class="walk-rule"></div>';
    html += '<div class="walk-start-row">';
    if (firstSpot) {
      html += '<a class="walk-cta" href="' + firstSpot.url + '" target="_blank">&#8599; Start here</a>';
    }
    html += '<span class="walk-stop-count">' + w.spots.length + ' stops in order</span>';
    html += '</div>';
    html += '<div class="walk-timeline">';
    for (var j = 0; j < w.spots.length; j++) {
      var s = SPOTS_BY_ID[w.spots[j]];
      if (!s) continue;
      var stopNum = (j + 1) < 10 ? '0' + (j + 1) : '' + (j + 1);
      var itemId = 'ws-' + w.id + '-' + s.id;
      var isSaved = !!savedData[s.id];
      html += '<div class="walk-stop-item" id="' + itemId + '">';
      html += '<div class="walk-stop-num" onclick="toggleWalkStop(\'' + w.id + '\',' + s.id + ')">' + stopNum + '</div>';
      html += '<div class="walk-stop-card">';
      html += '<div class="walk-stop-head" onclick="toggleWalkStop(\'' + w.id + '\',' + s.id + ')">';
      html += '<div class="walk-stop-name">' + s.name + '</div>';
      html += tagTime(s.time);
      html += '<span class="walk-stop-arrow" style="margin-left:8px">&#9660;</span>';
      html += '</div>';
      html += '<div class="walk-stop-body">';
      html += '<div class="walk-stop-rule"></div>';
      html += '<div class="spot-desc">' + s.desc + '</div>';
      if (s.tip) { html += '<div class="spot-tip">' + s.tip + '</div>'; }
      html += '<div class="spot-actions">';
      html += '<a class="map-btn" href="' + s.url + '" target="_blank">&#8599; Maps</a>';
      html += '<button class="' + (isSaved ? 'save-btn saved' : 'save-btn') + '" onclick="toggleSave(event,' + s.id + ')" title="Save">' + (isSaved ? '&#9733;' : '&#9734;') + '</button>';
      html += '</div></div></div></div>';
    }
    html += '</div></div></div>';
  }
  container.innerHTML = html;
}

// ── TOGGLES ──
function toggleSpot(id) {
  var card = document.getElementById('card-' + id);
  if (!card) return;
  card.className = card.className.indexOf('open') >= 0 ? 'spot-card' : 'spot-card open';
}

function toggleWalk(id) {
  var card = document.getElementById('wcard-' + id);
  if (!card) return;
  card.className = card.className.indexOf('open') >= 0 ? 'walk-card' : 'walk-card open';
}

function toggleWalkStop(walkId, spotId) {
  var itemId = 'ws-' + walkId + '-' + spotId;
  var item = document.getElementById(itemId);
  if (!item) return;
  item.className = item.className.indexOf('open') >= 0 ? 'walk-stop-item' : 'walk-stop-item open';
}

function toggleSave(e, id) {
  e.stopPropagation();
  savedData[id] = !savedData[id];
  savePersist();
  var btn = e.target || e.srcElement;
  if (savedData[id]) {
    btn.className = 'save-btn saved';
    btn.innerHTML = '&#9733;';
  } else {
    btn.className = 'save-btn';
    btn.innerHTML = '&#9734;';
  }
  if (currentFilter === 'saved') renderSpots();
}

// ── VIEW SWITCHING ──
function showView(view) {
  currentView = view;
  var exploreEl = document.getElementById('view-explore');
  var walksEl = document.getElementById('view-walks');
  var coverEl = document.getElementById('coverId');
  var controlsEl = document.getElementById('controls');
  var navItems = document.querySelectorAll('.nav-item');

  if (view === 'walks') {
    exploreEl.style.display = 'none';
    walksEl.style.display = 'block';
    coverEl.style.display = 'none';
    controlsEl.style.display = 'none';
  } else {
    exploreEl.style.display = 'block';
    walksEl.style.display = 'none';
    coverEl.style.display = 'flex';
    controlsEl.style.display = 'block';
    if (view === 'saved') {
      currentFilter = 'saved';
      var chips = document.querySelectorAll('.chip');
      for (var i = 0; i < chips.length; i++) {
        chips[i].className = chips[i].getAttribute('data-f') === 'saved' ? 'chip active' : 'chip';
      }
      renderSpots();
    }
  }

  for (var i = 0; i < navItems.length; i++) {
    navItems[i].className = 'nav-item';
  }
  var activeNav = document.getElementById('nav-' + (view === 'saved' ? 'saved' : view));
  if (activeNav) activeNav.className = 'nav-item active';
}

// ── EVENTS ──
var chipsRow = document.getElementById('chipsRow');
chipsRow.onclick = function(e) {
  var t = e.target || e.srcElement;
  while (t && t.tagName !== 'BUTTON') { t = t.parentNode; }
  if (!t || !t.getAttribute('data-f')) return;
  var allChips = chipsRow.querySelectorAll('.chip');
  for (var i = 0; i < allChips.length; i++) { allChips[i].className = 'chip'; }
  t.className = 'chip active';
  currentFilter = t.getAttribute('data-f');
  renderSpots();
};

var searchInput = document.getElementById('searchInput');
searchInput.oninput = function() {
  currentSearch = searchInput.value ? searchInput.value.replace(/^\s+|\s+$/g,'') : '';
  renderSpots();
};

// ── INIT ──
renderSpots();
renderWalks();
</script>
</body>
</html>
